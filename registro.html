<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta – Cafetería del Puente</title>
    <meta name="description" content="Crea tu cuenta en Cafetería del Puente y disfruta beneficios exclusivos.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { poppins: ['Poppins', 'sans-serif'] },
                    colors: {
                        brand: '#F47E24',
                        'brand-dark': '#e06b15',
                        'cafe-900': '#1e0f07',
                        'cafe-800': '#2c1408',
                        'cafe-700': '#3d1e0b',
                    },
                    animation: {
                        'slide-up': 'slideUp 0.55s cubic-bezier(0.22,1,0.36,1) both',
                        'float': 'float 8s ease-in-out infinite',
                    },
                    keyframes: {
                        slideUp: {
                            from: { opacity: '0', transform: 'translateY(32px)' },
                            to: { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%,100%': { transform: 'translateY(0) scale(1)' },
                            '50%': { transform: 'translateY(-18px) scale(1.04)' },
                        },
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .input-focus:focus {
            border-color: #F47E24;
            box-shadow: 0 0 0 4px rgba(244, 126, 36, 0.12);
            background: #fff;
            outline: none;
        }

        .check-custom {
            appearance: none;
        }

        .check-custom:checked {
            background-color: #F47E24;
            border-color: #F47E24;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3E%3C/svg%3E");
        }

        /* Barras fortaleza */
        .bar {
            transition: background 0.3s;
            background: #f0e0d0;
        }

        .bar.weak {
            background: #ef4444;
        }

        .bar.fair {
            background: #f97316;
        }

        .bar.good {
            background: #22c55e;
        }

        .bar.great {
            background: #16a34a;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center relative overflow-x-hidden py-6">

    <!-- Fondo imagen -->
    <div class="fixed inset-0 bg-cover bg-center bg-no-repeat z-0"
        style="background-image: url('./images/puente fondo.png');"></div>

    <!-- Overlay -->
    <div class="fixed inset-0 z-10"
        style="background: linear-gradient(135deg, rgba(30,15,7,0.90) 0%, rgba(62,27,8,0.80) 50%, rgba(30,15,7,0.92) 100%);">
    </div>

    <!-- Partículas -->
    <div class="fixed w-72 h-72 -top-16 -left-16 rounded-full bg-brand/10 animate-float z-10 pointer-events-none"></div>
    <div class="fixed w-52 h-52 -bottom-10 -right-10 rounded-full bg-brand/10 z-10 pointer-events-none"
        style="animation: float 8s ease-in-out 2.5s infinite;"></div>
    <div class="fixed w-32 h-32 top-1/3 left-1/12 rounded-full bg-brand/8 z-10 pointer-events-none"
        style="animation: float 8s ease-in-out 5s infinite;"></div>

    <!-- Botón volver -->
    <a href="./index.html" class="fixed top-5 left-6 z-30 inline-flex items-center gap-2 text-white text-sm font-medium
               bg-white/10 backdrop-blur-sm border border-white/20 px-4 py-2 rounded-full
               hover:bg-brand/30 hover:border-brand/50 transition-all duration-300">
        <i class="fas fa-arrow-left text-xs"></i> Volver al inicio
    </a>

    <!-- Card Registro -->
    <div class="relative z-20 w-full max-w-lg px-4 animate-slide-up">
        <div class="bg-white rounded-3xl px-9 py-9 shadow-2xl shadow-black/50 ring-1 ring-brand/10">

            <!-- Logo -->
            <div class="text-center mb-6">
                <img src="./images/logo-original.svg" alt="Logo Cafetería del Puente"
                    class="h-14 w-auto mx-auto object-contain"
                    onerror="this.style.display='none'; document.getElementById('logo-fb').style.display='inline-flex'">
                <div id="logo-fb"
                    class="hidden mx-auto w-12 h-12 rounded-2xl bg-gradient-to-br from-brand to-brand-dark items-center justify-center shadow-lg shadow-brand/30">
                    <i class="fas fa-coffee text-white text-xl"></i>
                </div>
            </div>

            <!-- Título -->
            <div class="text-center mb-1">
                <h1 class="text-2xl font-bold text-cafe-900 tracking-tight">Crear tu cuenta</h1>
                <p class="text-sm text-gray-500 mt-1 font-light">¡Únete a la familia del Puente!</p>
            </div>

            <!-- Separador -->
            <div class="h-px bg-gradient-to-r from-transparent via-orange-200 to-transparent my-5"></div>

            <!-- Alerta error -->
            <div id="alert-box"
                class="hidden mb-4 flex items-center gap-2 px-4 py-3 rounded-2xl bg-red-50 border border-red-200 text-red-700 text-xs">
                <i class="fas fa-exclamation-circle"></i>
                <span id="alert-msg"></span>
            </div>

            <!-- Formulario -->
            <form id="reg-form" method="POST" action="./backend/autenticacion/registrar.php" novalidate>

                <!-- Nombre + Apellido -->
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <div>
                        <label for="r-nombre"
                            class="block text-xs font-semibold text-cafe-700 uppercase tracking-wider mb-1.5">
                            Nombre
                        </label>
                        <div class="relative">
                            <span
                                class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" id="r-nombre" name="nombre" required placeholder="Juan"
                                autocomplete="given-name"
                                class="w-full pl-9 pr-3 py-2.5 rounded-full border-2 border-orange-100 bg-orange-50/60
                                       text-gray-800 placeholder-gray-400 text-sm transition-all duration-200 input-focus">
                        </div>
                    </div>
                    <div>
                        <label for="r-apellido"
                            class="block text-xs font-semibold text-cafe-700 uppercase tracking-wider mb-1.5">
                            Apellido
                        </label>
                        <div class="relative">
                            <span
                                class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-xs pointer-events-none">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" id="r-apellido" name="apellido" required placeholder="Pérez"
                                autocomplete="family-name"
                                class="w-full pl-9 pr-3 py-2.5 rounded-full border-2 border-orange-100 bg-orange-50/60
                                       text-gray-800 placeholder-gray-400 text-sm transition-all duration-200 input-focus">
                        </div>
                    </div>
                </div>

                <!-- Usuario -->
                <div class="mb-3">
                    <label for="r-usuario"
                        class="block text-xs font-semibold text-cafe-700 uppercase tracking-wider mb-1.5">
                        Nombre de usuario
                    </label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">
                            <i class="fas fa-at"></i>
                        </span>
                        <input type="text" id="r-usuario" name="usuario" required placeholder="juanperez23"
                            autocomplete="username" class="w-full pl-10 pr-4 py-2.5 rounded-full border-2 border-orange-100 bg-orange-50/60
                                   text-gray-800 placeholder-gray-400 text-sm transition-all duration-200 input-focus">
                    </div>
                </div>

                <!-- Correo -->
                <div class="mb-3">
                    <label for="r-email"
                        class="block text-xs font-semibold text-cafe-700 uppercase tracking-wider mb-1.5">
                        Correo electrónico
                    </label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="r-email" name="email" required placeholder="juan@ejemplo.com"
                            autocomplete="email" class="w-full pl-10 pr-4 py-2.5 rounded-full border-2 border-orange-100 bg-orange-50/60
                                   text-gray-800 placeholder-gray-400 text-sm transition-all duration-200 input-focus">
                    </div>
                </div>

                <!-- Contraseña -->
                <div class="mb-1">
                    <label for="r-pass"
                        class="block text-xs font-semibold text-cafe-700 uppercase tracking-wider mb-1.5">
                        Contraseña
                    </label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="r-pass" name="password" required placeholder="Mínimo 8 caracteres"
                            autocomplete="new-password" class="w-full pl-10 pr-11 py-2.5 rounded-full border-2 border-orange-100 bg-orange-50/60
                                   text-gray-800 placeholder-gray-400 text-sm transition-all duration-200 input-focus">
                        <button type="button" id="toggle-p1"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-brand text-sm transition-colors p-1">
                            <i class="fas fa-eye" id="eye1"></i>
                        </button>
                    </div>
                </div>

                <!-- Barra fortaleza -->
                <div id="strength-wrap" class="hidden mb-3 px-1">
                    <div class="flex gap-1 mt-2 mb-1">
                        <div class="bar h-1 rounded-full flex-1" id="b1"></div>
                        <div class="bar h-1 rounded-full flex-1" id="b2"></div>
                        <div class="bar h-1 rounded-full flex-1" id="b3"></div>
                        <div class="bar h-1 rounded-full flex-1" id="b4"></div>
                    </div>
                    <span class="text-xs font-medium" id="strength-label" style="color:#8a7060;"></span>
                </div>

                <!-- Repetir contraseña -->
                <div class="mb-3">
                    <label for="r-pass2"
                        class="block text-xs font-semibold text-cafe-700 uppercase tracking-wider mb-1.5">
                        Repetir contraseña
                    </label>
                    <div class="relative">
                        <span
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm pointer-events-none">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="r-pass2" name="password2" required placeholder="Repite tu contraseña"
                            autocomplete="new-password" class="w-full pl-10 pr-11 py-2.5 rounded-full border-2 border-orange-100 bg-orange-50/60
                                   text-gray-800 placeholder-gray-400 text-sm transition-all duration-200 input-focus">
                        <button type="button" id="toggle-p2"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-brand text-sm transition-colors p-1">
                            <i class="fas fa-eye" id="eye2"></i>
                        </button>
                    </div>
                </div>

                <!-- Términos -->
                <label class="flex items-start gap-2.5 mt-2 mb-5 cursor-pointer select-none">
                    <input type="checkbox" id="r-terms" name="terms"
                        class="check-custom mt-0.5 min-w-[17px] h-[17px] rounded border-2 border-gray-300 cursor-pointer transition-all">
                    <span class="text-xs text-gray-500 leading-relaxed">
                        Acepto los
                        <a href="#" class="text-brand font-semibold hover:underline">Términos y condiciones</a>
                        y la
                        <a href="#" class="text-brand font-semibold hover:underline">Política de privacidad</a>
                    </span>
                </label>

                <!-- Botón -->
                <button type="submit" class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-brand to-brand-dark
                           text-white font-semibold py-3.5 rounded-full text-base shadow-lg shadow-brand/30
                           hover:shadow-brand/50 hover:scale-[1.02] active:scale-100 transition-all duration-200">
                    <i class="fas fa-user-plus text-sm"></i>
                    Crear mi cuenta
                </button>

            </form>

            <!-- Pie -->
            <p class="text-center mt-5 text-sm text-gray-500">
                ¿Ya tienes una cuenta?
                <a href="./login.html"
                    class="text-brand font-semibold hover:text-brand-dark hover:underline transition-colors">
                    Inicia sesión aquí
                </a>
            </p>

        </div>
    </div>

    <script>
        /* Toggles contraseña */
        function mkToggle(btnId, inputId, eyeId) {
            document.getElementById(btnId).addEventListener('click', function () {
                const inp = document.getElementById(inputId);
                const eye = document.getElementById(eyeId);
                inp.type = inp.type === 'password' ? 'text' : 'password';
                eye.className = inp.type === 'text' ? 'fas fa-eye-slash' : 'fas fa-eye';
            });
        }
        mkToggle('toggle-p1', 'r-pass', 'eye1');
        mkToggle('toggle-p2', 'r-pass2', 'eye2');

        /* Fortaleza contraseña */
        document.getElementById('r-pass').addEventListener('input', function () {
            const val = this.value;
            const wrap = document.getElementById('strength-wrap');
            const bars = ['b1', 'b2', 'b3', 'b4'].map(id => document.getElementById(id));
            const label = document.getElementById('strength-label');

            if (!val) { wrap.classList.add('hidden'); return; }
            wrap.classList.remove('hidden');

            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const cls = ['', 'weak', 'fair', 'good', 'great'];
            const txt = ['', 'Débil', 'Regular', 'Buena', '¡Excelente!'];
            const col = ['', '#ef4444', '#f97316', '#22c55e', '#16a34a'];
            bars.forEach((b, i) => {
                b.className = 'bar h-1 rounded-full flex-1';
                if (i < score) b.classList.add(cls[score]);
            });
            label.textContent = txt[score] || '';
            label.style.color = col[score] || '#8a7060';
        });

        /* Mostrar alerta */
        function showAlert(msg) {
            const box = document.getElementById('alert-box');
            document.getElementById('alert-msg').textContent = msg;
            box.classList.remove('hidden');
            box.classList.add('flex');
            setTimeout(() => { box.classList.add('hidden'); box.classList.remove('flex'); }, 4500);
        }

        /* Mensajes de error/éxito según ?error= en la URL */
        const errores = {
            campos_vacios:            'Por favor completa todos los campos.',
            passwords_no_coinciden:   'Las contraseñas no coinciden.',
            password_corta:           'La contraseña debe tener al menos 8 caracteres.',
            ya_existe:                'Ese correo o nombre de usuario ya está registrado.'
        };
        const params = new URLSearchParams(window.location.search);
        const err    = params.get('error');
        if (err && errores[err]) showAlert(errores[err]);

        /* Validación */
        document.getElementById('reg-form').addEventListener('submit', function (e) {
            const nombre = document.getElementById('r-nombre').value.trim();
            const apellido = document.getElementById('r-apellido').value.trim();
            const usuario = document.getElementById('r-usuario').value.trim();
            const email = document.getElementById('r-email').value.trim();
            const pass1 = document.getElementById('r-pass').value;
            const pass2 = document.getElementById('r-pass2').value;
            const terms = document.getElementById('r-terms').checked;

            if (!nombre || !apellido) { e.preventDefault(); showAlert('Completa tu nombre y apellido.'); return; }
            if (!usuario) { e.preventDefault(); showAlert('El nombre de usuario es obligatorio.'); return; }
            if (!/^[a-zA-Z0-9_]{3,20}$/.test(usuario)) {
                e.preventDefault(); showAlert('El usuario solo puede tener letras, números y guion bajo (3–20 caracteres).'); return;
            }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                e.preventDefault(); showAlert('Ingresa un correo electrónico válido.'); return;
            }
            if (pass1.length < 8) { e.preventDefault(); showAlert('La contraseña debe tener al menos 8 caracteres.'); return; }
            if (pass1 !== pass2) { e.preventDefault(); showAlert('Las contraseñas no coinciden.'); return; }
            if (!terms) { e.preventDefault(); showAlert('Debes aceptar los términos y condiciones.'); return; }
        });
    </script>

</body>

</html>
