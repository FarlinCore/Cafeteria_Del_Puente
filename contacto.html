<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <header class=" w-full top-0 z-50 lg:px-16 px-4 bg-white flex flex-wrap items-center py-2 shadow-lg">
        <div class="flex-1 flex justify-between items-center">
            <a href="#" class="text-3xl text-[#55301c] font-semibold">Contacto</a>
        </div>

        <label for="menu-toggle" class="pointer-cursor md:hidden block">
            <svg class="fill-current text-gray-900" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                viewBox="0 0 20 20">
                <title>Sobre Nosotros</title>
                <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z"></path>
            </svg>
        </label>
        <input class="hidden" type="checkbox" id="menu-toggle" />

        <div class="hidden md:flex md:items-center md:w-auto w-full" id="menu">
            <nav>
                <ul class="md:flex items-center justify-between text-base text-[#55301c] pt-4 md:pt-0">
                    <li><a class="md:p-4 py-3 px-0 block" href="./index.html">Inicio</a></li>
                    <li><a class="md:p-4 py-3 px-0 block" href="./menu.html">Menu</a></li>
                    <li><a class="md:p-4 py-3 px-0 block" href="./sobre-nosotros.html">Sobre Nosotros</a></li>
                    <li><a class="md:p-4 py-3 px-0 block" href="./nuestra-gente.html">Nuestra Gente</a></li>
                    <li><a class=" font-semibold py-1 md:p-1 text-[#55301c] md:mb-0 mb-2 rounded-full bg-white"
                            href="./contacto.html">Contacto</a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>
    <section id="contact" class="py-16 bg-[#55301c] text-white">
        <div class="container mx-auto px-6">
            <h2 class="text-3xl font-bold text-center mb-12">Contact Us</h2>

            <div class="flex flex-col lg:flex-row gap-12">
                <!-- Contact Form -->
                <div class="lg:w-1/2">
                    <form class="contact-form space-y-6">
                        <div>
                            <label for="name" class="block mb-2">Nombre</label>
                            <input type="text" id="name" placeholder="Enter your name"
                                class="w-full px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>

                        <div>
                            <label for="email" class="block mb-2">Correo Electronico</label>
                            <input type="email" id="email" placeholder="Enter your email"
                                class="w-full px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>

                        <div>
                            <label for="phone" class="block mb-2">Numero de telefono</label>
                            <input type="tel" id="phone" placeholder="Enter your phone number"
                                class="w-full px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500">
                        </div>

                        <div>
                            <label for="message" class="block mb-2">Tu mensaje</label>
                            <textarea id="message" rows="5" placeholder="How can we help you?"
                                class="w-full px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500"></textarea>
                        </div>

                        <button type="submit"
                            class="bg-white px-6 hover:bg-amber-600 text-[#55301c] py-3 rounded-lg font-semibold">
                            Enviar mensaje
                        </button>
                    </form>
                </div>

                <!-- Contact Info -->
                <div class="lg:w-1/2">
                    <div class="bg-amber-900/50 rounded-xl p-8 h-full">
                        <h3 class="text-2xl font-semibold mb-6">Comunicate con nosotros</h3>

                        <div class="space-y-6">
                            <div class="flex items-start">
                                <div class="text-amber-300 text-xl mt-1 mr-4">
                                    <i class="fas fa-map-marker-alt"></i>
                                </div>
                                <div>
                                    <h4 class="font-semibold mb-1">Ubicacion</h4>
                                    <p>Mao<br>Detras de UTESA</p>
                                </div>
                            </div>

                            <div class="flex items-start">
                                <div class="text-amber-300 text-xl mt-1 mr-4">
                                    <i class="fas fa-envelope"></i>
                                </div>
                                <div>
                                    <h4 class="font-semibold mb-1">Correo electronico</h4>
                                    <a href="mailto:annedukundimana@gmail.com"
                                        class="hover:text-amber-200">delpuentecafe@gmail.com</a>
                                </div>
                            </div>

                            <div class="flex items-start">
                                <div class="text-amber-300 text-xl mt-1 mr-4">
                                    <i class="fas fa-phone-alt"></i>
                                </div>
                                <div>
                                    <h4 class="font-semibold mb-1">Telefono</h4>
                                    <p>809-572-8853</p>
                                </div>
                            </div>

                            <div class="flex items-start">
                                <div class="text-amber-300 text-xl mt-1 mr-4">
                                    <i class="fas fa-clock"></i>
                                </div>
                                <div>
                                    <h4 class="font-semibold mb-1">Horario</h4>
                                    <p>MLunes - Domingo<br>
                                        8:00 am - 12:00 pm<br>
                                        2:00 pm - 7:30 PM</p>
                                </div>
                            </div>

                            <div class="flex items-start">
                                <div class="text-amber-300 text-xl mt-1 mr-4">
                                    <i class="fas fa-share-alt"></i>
                                </div>
                                <div>
                                    <h4 class="font-semibold mb-3">Siguenos</h4>
                                    <div class="flex space-x-4">
                                        <a href="#" class="text-amber-300 hover:text-white text-2xl">
                                            <i class="fab fa-facebook"></i>
                                        </a>
                                        <a href="#" class="text-amber-300 hover:text-white text-2xl">
                                            <i class="fab fa-instagram"></i>
                                        </a>
                                        <a href="#" class="text-amber-300 hover:text-white text-2xl">
                                            <i class="fab fa-twitter"></i>
                                        </a>
                                        <a href="#" class="text-amber-300 hover:text-white text-2xl">
                                            <i class="fab fa-whatsapp"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Map
            <div class="mt-16 rounded-xl overflow-hidden shadow-2xl">
                <iframe
                    src="https://www.google.com/maps?gs_lcrp=EgZjaHJvbWUqBggAEEUYOzIGCAAQRRg7MgYIARBFGDkyBggCEEUYPDIGCAMQRRg8MgYIBBBFGDwyBggFEC4YQNIBCDE2NTNqMGoxqAIAsAIA&um=1&ie=UTF-8&fb=1&gl=do&sa=X&geocode=KSFjSpo0pbGOMdnM_zw3deDs&daddr=Ana+Delia+Jorge+01,+Santa+Cruz+de+Mao"
                    width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                    class="rounded-xl"></iframe>
            </div>
        </div>
    </section>
</body>

</html>
